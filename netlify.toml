[build]
  command = "npm run build"
  publish = ".next"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://assets.calendly.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-src https://calendly.com;"

[[redirects]]
  from = "http://starlightai.site/*"
  to = "https://www.starlightai.site/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.starlightai.site/*"
  to = "https://www.starlightai.site/:splat"
  status = 301
  force = true
